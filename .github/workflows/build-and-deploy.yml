name: Build Movin Synced Demo and Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install media tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng
          python -m pip install edge-tts

      - name: Validate uploaded video clips
        run: |
          python scripts/validate_assets.py

      - name: Build synchronized narration MP3
        run: |
          python scripts/build_narration.py

      - name: Weave video clips into final MP4
        run: |
          python scripts/build_weaved_video.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          rsync -av --exclude='.git' --exclude='.github' --exclude='scripts' --exclude='COLAB_VIDEO_PROCESSOR.ipynb' --exclude='*.zip' ./ _site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
